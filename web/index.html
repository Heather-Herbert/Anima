<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #7c6af7;
      --accent-dim: #4a3fa0;
      --text: #e0e0e0;
      --text-dim: #888;
      --user-bg: #1e2a3a;
      --agent-bg: #1a1a2e;
      --confirm-bg: #2a1a0a;
      --confirm-border: #8b5e3c;
      --danger: #c0392b;
      --success: #27ae60;
      --radius: 10px;
      --font: system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── LOGIN ─────────────────────────────────────────── */
    #login-screen {
      width: 100%;
      max-width: 360px;
      padding: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    #login-screen h1 {
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
      color: var(--accent);
    }

    #login-screen p {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }

    #login-screen input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
    }

    #login-screen input:focus { border-color: var(--accent); }

    #login-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }

    /* ── CHAT ──────────────────────────────────────────── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 760px;
      height: 100dvh;
      padding: 0;
    }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #chat-header h1 { font-size: 1rem; color: var(--accent); letter-spacing: 0.05em; }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      display: inline-block;
      margin-right: 6px;
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--success); }
    #status-dot.processing { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    #logout-btn {
      font-size: 0.75rem;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
    }
    #logout-btn:hover { color: var(--text); border-color: var(--text-dim); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .msg {
      max-width: 80%;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid #2a3f5a;
    }

    .msg.agent {
      align-self: flex-start;
      background: var(--agent-bg);
      border: 1px solid #2a2a4a;
    }

    .msg.system {
      align-self: center;
      font-size: 0.78rem;
      color: var(--text-dim);
      background: none;
      border: none;
      padding: 0;
    }

    /* ── CONFIRM WIDGET ────────────────────────────────── */
    .msg.confirm {
      align-self: flex-start;
      background: var(--confirm-bg);
      border: 1px solid var(--confirm-border);
      max-width: 90%;
    }

    .confirm-header {
      font-size: 0.78rem;
      font-weight: 600;
      color: #e08030;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .confirm-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.4rem; }
    .confirm-value { font-size: 0.88rem; margin-top: 0.1rem; }

    .confirm-actions { display: flex; gap: 0.5rem; margin-top: 0.85rem; }

    .confirm-actions button {
      padding: 0.4rem 1rem;
      border-radius: 5px;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
    }

    .btn-approve { background: var(--success); color: #fff; }
    .btn-approve:hover { background: #219a52; }
    .btn-deny { background: var(--danger); color: #fff; }
    .btn-deny:hover { background: #a93226; }
    .btn-approve:disabled, .btn-deny:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── INPUT BAR ─────────────────────────────────────── */
    #input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 0.65rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      resize: none;
      outline: none;
      font-family: var(--font);
      max-height: 120px;
    }
    #msg-input:focus { border-color: var(--accent); }

    /* ── SHARED BUTTON ─────────────────────────────────── */
    .btn-primary {
      padding: 0.65rem 1.1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>Anima</h1>
  <p>Enter your password to continue.</p>
  <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
  <div id="login-error"></div>
  <button class="btn-primary" id="login-btn" style="width:100%">Sign in</button>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div id="chat-header">
    <div>
      <span id="status-dot"></span>
      <h1 style="display:inline">Anima</h1>
    </div>
    <button id="logout-btn">Sign out</button>
  </div>
  <div id="messages"></div>
  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Message Anima…"></textarea>
    <button class="btn-primary" id="send-btn">Send</button>
  </div>
</div>

<script>
  const PING_INTERVAL_MS = 10 * 60 * 1000;

  // ── DOM refs ──────────────────────────────────────────
  const loginScreen  = document.getElementById('login-screen');
  const chatScreen   = document.getElementById('chat-screen');
  const passwordInput = document.getElementById('password-input');
  const loginBtn     = document.getElementById('login-btn');
  const loginError   = document.getElementById('login-error');
  const messagesEl   = document.getElementById('messages');
  const msgInput     = document.getElementById('msg-input');
  const sendBtn      = document.getElementById('send-btn');
  const logoutBtn    = document.getElementById('logout-btn');
  const statusDot    = document.getElementById('status-dot');

  let eventSource = null;
  let pingTimer   = null;
  let processing  = false;

  // ── Helpers ───────────────────────────────────────────
  function setProcessing(val) {
    processing = val;
    sendBtn.disabled = val;
    msgInput.disabled = val;
    statusDot.className = val ? 'processing' : 'connected';
  }

  function appendMsg(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendConfirm(details) {
    const div = document.createElement('div');
    div.className = 'msg confirm';

    const taintWarning = details.isTainted
      ? '<p style="color:#e08030;font-size:0.8rem;margin-top:0.3rem">⚠ Web search was used — be extra cautious.</p>'
      : '';

    div.innerHTML = `
      <div class="confirm-header">Permission Required</div>
      <div class="confirm-label">Tool</div>
      <div class="confirm-value">${escHtml(details.functionName)}</div>
      <div class="confirm-label">Why</div>
      <div class="confirm-value">${escHtml(details.justification)}</div>
      ${taintWarning}
      <div class="confirm-actions">
        <button class="btn-approve">Approve</button>
        <button class="btn-deny">Deny</button>
      </div>`;

    const approveBtn = div.querySelector('.btn-approve');
    const denyBtn    = div.querySelector('.btn-deny');

    function respond(approved) {
      approveBtn.disabled = true;
      denyBtn.disabled = true;
      fetch('/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ approved }),
      });
    }

    approveBtn.addEventListener('click', () => respond(true));
    denyBtn.addEventListener('click',    () => respond(false));

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── SSE ───────────────────────────────────────────────
  let reconnectDelay = 1000;

  function connectSse() {
    if (eventSource) { eventSource.close(); eventSource = null; }

    eventSource = new EventSource('/events');

    eventSource.onopen = () => {
      statusDot.className = processing ? 'processing' : 'connected';
      reconnectDelay = 1000;
    };

    eventSource.onmessage = (e) => {
      let event;
      try { event = JSON.parse(e.data); } catch (_) { return; }

      if (event.type === 'response') {
        appendMsg(event.content, 'agent');
        setProcessing(false);
      } else if (event.type === 'confirm') {
        appendConfirm(event.details);
      } else if (event.type === 'confirm_result') {
        appendMsg(event.approved ? '✓ Approved' : '✗ Denied', 'system');
      } else if (event.type === 'error') {
        appendMsg('Error: ' + event.content, 'system');
        setProcessing(false);
      } else if (event.type === 'status') {
        appendMsg(event.content, 'system');
      }
    };

    eventSource.onerror = () => {
      statusDot.className = '';
      eventSource.close();
      eventSource = null;
      setTimeout(connectSse, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30_000);
    };
  }

  // ── Ping ─────────────────────────────────────────────
  function startPing() {
    stopPing();
    pingTimer = setInterval(() => {
      fetch('/ping', { method: 'POST' }).catch(() => {});
    }, PING_INTERVAL_MS);
  }

  function stopPing() {
    if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
  }

  // ── Auth ─────────────────────────────────────────────
  async function doLogin() {
    loginError.textContent = '';
    const password = passwordInput.value;
    if (!password) return;

    loginBtn.disabled = true;
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        enterChat();
      } else {
        const body = await res.json().catch(() => ({}));
        loginError.textContent = body.error || 'Login failed.';
        passwordInput.value = '';
        passwordInput.focus();
      }
    } catch (_) {
      loginError.textContent = 'Could not reach the server.';
    } finally {
      loginBtn.disabled = false;
    }
  }

  async function doLogout() {
    stopPing();
    if (eventSource) { eventSource.close(); eventSource = null; }
    await fetch('/logout', { method: 'POST' }).catch(() => {});
    messagesEl.innerHTML = '';
    chatScreen.style.display = 'none';
    loginScreen.style.display = '';
    passwordInput.value = '';
    statusDot.className = '';
  }

  function enterChat() {
    loginScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    connectSse();
    startPing();
    msgInput.focus();
  }

  // ── Send message ──────────────────────────────────────
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || processing) return;

    appendMsg(text, 'user');
    msgInput.value = '';
    msgInput.style.height = 'auto';
    setProcessing(true);

    try {
      const res = await fetch('/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        appendMsg('Error: ' + (body.error || res.statusText), 'system');
        setProcessing(false);
      }
    } catch (_) {
      appendMsg('Error: Could not reach the server.', 'system');
      setProcessing(false);
    }
  }

  // ── Event listeners ───────────────────────────────────
  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  logoutBtn.addEventListener('click', doLogout);

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
